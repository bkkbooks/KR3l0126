  text: 李復言編第一卷楊恭政辛公平上仙凉國武公李愬薛中丞存誠麒麟客第二卷盧僕射從史李岳州張質韋令公皐鄭虢州騊夫人薛偉第三卷蘇州客張􅁃竇玉妻房杜二相國錢方義第四卷張逢定婚店葉令女驢言蔡榮梁革李衞公靖行雨續幽怪録目録臨安府太廟前尹家書籍鋪刋行
