  text: 續幽怪録卷第四
  hash: sha256:31eb0f36c8592d6dc705d8ff266d77b93e549ce5cdfbf1362e6296e426207c74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0126_SBCK_004-1a}
body:
  text: 李復之編張逢南陽張逢元和末薄遊嶺表行次福州福唐縣撗山店時􅀄霽日將暮山色鮮媚煙嵐藹然筞杖㝷勝不覺極逺忽有一叚細草縱廣百餘歩碧鮮可愛其傍有一小林遂脫衣掛林以杖􅀝之投身草上左右翻轉旣而酣甚􅀂獸蹍然意足而起其身巳成虎也文彩爛然自視其􅀲牙之利􅇩􅈩之力天下無敵遂騰躍而起超山越壑其疾如電夜乆頗飢因傍村落徐行犬􅇾駒犢之軰悉無可取意中恍惚自謂當得福州鄭録事乃傍道潜伏未幾有人自南行􅀂􅀱吏迎鄭糺者見人問曰福州鄭録事名璠計程宿前店見說何時發來人曰吾之出掌人也聞其飾裝到亦非乆􅀱吏曰只一人來且復有同行者吾當迎拜時慮其悞也曰三人之中􅃤緑者是其時逢方伺之而彼詳問􅀂爲逄而問者逄旣知之攅身以俟之俄而鄭糺到導從甚衆衣􅃤緑甚􅏂巍巍而來適到逢前遂􅝌銜之走而上山時天未曉人莫敢逐得恣食之殘其腸髮耳行於山林單然無侣乃忽思曰本人也何樂爲虎自囚於深山盍求􅀄化之地而復耶乃歩歩㝷之日暮方到其所衣服猶掛杖亦􅀝林碧草依然翻復轉身於其上意足而起即復人形矣於是衣衣筞杖而歸昨往今來一復時矣􅀄其僕夫驚其失逢也訪之於隣或云筞杖登山多歧㝷之杳無行處及其來也驚喜問其故逢紿之曰偶㝷山泉到一山院共談釋教不覺移時掌人曰今且側近有虎食福州鄭録事求餘不得山林故多猛獸不易獨行郎之未迴憂􅀒亦極且喜平安無他逢遂行元和六年旅次淮陽舎於公舘舘吏宴客坐客有爲令者曰巡􅀂到各言巳之竒事事不竒者罰巡到逢逢言橫山之事末坐有進士鄭遐者乃鄭糺之子也怒目而起持刀將煞逢言復父讎衆共隔之遐怒不巳遂白郡將於是送遐淮南勑津吏勿復渡逢西邁具改姓名以避遐議曰聞父之讎不可以不報然此讎非故煞必使煞逢遐亦當坐遂遁去而不復其讎也定婚店杜陵韋固少孤思早娶婦多歧求婚必無成而罷元和二年將遊清河旅次宋城南店客有以前清河司馬潘昉女見議者來日先明期於店西龍興寺門固以求之意切且往焉斜月尚明有老人􅀝布囊坐於階上向月撿書固歩覘之不識其字旣非虫􅂐八分科斗之勢又非􅆊書因問曰老父所㝷者何書固少小苦學丗間之字自謂無不識者西國􅆊字亦能讀之唯此書目所未覿如何老人􅀏曰此非丗間書君因何得見固曰非丗間書則何也曰幽冥之書固曰幽冥之人何以到此曰君行自早非某不當來也凡幽吏皆掌人生之事掌人可不行冥中乎今道途之行人􅀑各半自不辯爾固曰然則君又何掌曰天下之婚牘耳固喜曰固少孤常願早娶以廣㣧嗣爾來十年多方求之竟不遂意今者人有期此與議潘司馬女可以成乎曰未也命苟未合雖降衣纓而求屠博尚不可得况郡佐乎君之婦適三歳矣年十七當入君門因問囊中何物曰赤繩子耳以繫夫妻之足及其生則潜用相繫雖讎敵之家貴賤懸隔天涯從䆠呉楚異郷此繩一繫終不可逭君之脚巳繫於彼矣他求何益曰固妻安在其家何爲曰此店北賣菜陳婆女耳固曰可見乎曰陳甞抱來鬻菜於市能隨我行當即示君及明所期不至老人卷書揭囊而行固逐之入菜市有眇嫗抱三歳女來弊陋亦甚老人指曰此君之妻也固怒曰煞之可乎老人曰此人命當食天禄因子而食邑庸可煞乎老人遂隱固罵曰老􅀑妖妄如此吾士大夫之家娶婦必敵苟不能娶即聲妓之美者或援立之奈何㛰眇嫗之陋女磨一小刀子付其奴曰汝素幹事能爲我煞彼女賜汝萬錢奴曰諾明日䄂刀入菜行中於衆中刺之而走一市紛擾固與奴奔走獲免問奴曰所刺中否曰􅀄刺其心不幸才中眉間爾後固屢求婚終無所遂又十四年以父䕃叅相州軍刺史王泰俾攝司户􅁺專鞠詞獄以爲能因妻以其女可年十六七容色華麗固稱愜之極然其眉間常帖一花子雖沐浴間處未甞暫去歳餘固訝之忽憶昔日奴刀中眉間之說因逼問之妻澘然曰妾郡守之猶子也非其女也疇昔曾宰宋城終其官時妾在襁褓母兄次没唯一㽵在宋城南與乳母陳氏居去店近鬻􅂼以給朝夕陳氏憐小不忍暫弃三歳時抱行市中爲狂賊所刺刀痕尚在故以花子覆之七八年前叔從事盧龍遂得在左右仁念以爲女嫁君耳固曰陳氏眇乎曰然何以知之固曰所刺者固也乃曰竒也命也因盡言之相欽愈極後生男鯤爲鴈門太守封太原郡太夫人乃知隂騭之定不可變也宋城宰聞之題其店曰定婚店葉令女汝州葉縣令盧造者有女勾大曆中許邑客鄭楚曰及長以嫁君之子元方楚拜之俄而楚録潭州軍事造亦辭滿寓葉後楚卒元方護䘮居江陵數年間音問兩絶縣令韋計爲子娶焉其􅁻晨元方適到㑹武昌戍邊兵亦止其縣縣隘天雨甚元方無所容徑往縣東十二里佛舎舎西北隅有􅀂小獸號鳴者出火視之乃三虎子目猶未開以其小未能害人且不忍投於雨中閉門堅拒而巳約三更􅀄虎來觸其門不得入其西有䆫亦甚堅虎怒􅅮之櫺祈䧟頭於中爲左右所轄進退不得元方取佛塔塼擊之虎吼怒拏攫終莫能去連擊之俄頃而斃旣而聞門外􅀂女人呻吟氣甚困劣徐問曰門外呻吟者人耶􅀑耶曰人也曰何以到此曰妾前盧令女也今夕將適韋氏親迎方登卑爲虎所執􅀒荷而來投此今即無損雨甚畏其復來能相救乎元方竒之執燭出視真衣纓也年十七八禮服儼然泥水皆敵旣扶入復固其門拾佛塔毀像以繼其明女曰此何處也曰縣東僧舎耳元方言姓名且話舊諾女亦前記之曰妾父曾許妻君一且以君之絶耗也將嫁韋氏天命難改虎送歸君㽵去此甚近君能送歸請絶韋氏而奉巾櫛及明而送歸其家以虎欔而去方坐且制服禮見其來喜􅀂天降元方致虎於縣具言其事縣宰異之以盧氏歸于鄭焉驢言父當􅀐我我固不辭吾不􅀒汝汝不當􅀐我汝強􅀐我我亦􅀐汝汝我交􅀐何劫能止以吾之肌膚不啻直萬錢也只􅀒汝一緡半出門貨之人酬亦爾然而無的取者以他人不􅀒吾錢也麩行王胡子􅀒吾二緡吾不􅀒其力取其緡半還汝半緡充口食以終驢限耳和牽歸以告其母母泣曰郎􅀐汝年深固甚勞苦緡半錢何足惜將捨債豐秣而長生乎驢擺頭又曰賣而取錢乎乃􅀧頭遽令貨之人酬不過緡半且無敢取者牽入西市麩行逢一人長而胡者乃與半易之問其姓曰王自是連雨數日乃晴和往覘之驢巳死矣王竟不得􅀐又不􅀒之驗也和東隣有右金吾郎將張逹其妻李之出也余甞造焉云見驢言之夕遂聞其事且以戒欺暗者故備書之木工蔡榮中牟縣三異郷木工蔡榮者自㓜信神祇每食必分置於地潜祝土地自揔角至於不惑未甞暫忘也元和二年春卧疾六七日方暮有武吏走來謂其母曰蔡榮衣服器物速藏之勿使人見仍速作婦人裝梳覆以婦人之服有人來問必紿之曰出矣求其處則亦竟對勿令知所在也言訖走去妻母不測其故遽藏噐物裝梳才畢有將軍乗馬從十餘人全弓矢直入堂中曰蔡榮在否其母驚惶曰不在曰何往對曰榮醉歸怠於其業老婦怒而笞之榮或潜去不知何月餘日矣將軍遣吏入捜捜者出曰房中無亦無噐物將軍連呼地界教藏者出曰諾責曰蔡榮出行豈不知處對曰怒而去不告所由將軍曰王後殿傾湏此巧匠期限向盡何人堪替對曰梁城郷葉幹者巧於蔡榮訏其年限正當追役將軍者走馬而去有頃教藏者亦復曰某地所由也以蔡榮每食必相召故報恩耳然莫不驚之計即乎愈遂去母視榮即汗洽矣自此疾愈俄聞梁城郷葉幹者􅁀卒幹妻乃榮母之猶子也審其死者正當榮服雌服之時有李復者從母夫楊林爲中牟團乃於三異郷遍聞其說召榮母問之迴以相告泛􅀕之見德者豈其然乎梁革金吾􅀐曹梁革得和扁之術者也大和􅀄爲宛陵巡官按察使于公敖有青衣美色而艶者曰蓮子念之甚厚一旦以􅀏語獲罪斥出貨焉市吏定直曰七百緡從事御史崔公者聞而召焉命革􅐷其脉革􅐷其臂曰二十春無疾佳人也公喜留之送其直於于公公以常深念也偶怒而逐之售於不識者斯巳矣聞崔公寵之也不恱之意形於顔色然業巳去之難復召矣常貯於懷未一年蓮子暴死革方有外郵之事迴及城門逢柩車崔人有執紼者問其所葬曰蓮子也呼載歸而奔告崔曰蓮子非死蓋尸蹶耳向者革入郭遇其柩載歸而請往蘇之崔怒革之􅀄言悲蓮子之遽夭勃然曰疋夫也妄惑諸侯遂齒簪􅅂之列謂二十春無疾者一年而死今旣葬矣召柩而歸脫不能生何以相見階前數歩之内知公何有革曰此固非死而尸蹶耳千年而一苟不能生之是革術不神於天下何如就死以謝過言乃辭往崔第破棺出之遂刺其心及臍下各數處鑿去一齒以藥一刀圭於口中衣以單衣卧空床上以練索􅅞其手足有微火於床下曰此火衰蓮子生矣且戒其徒煮䓗粥伺焉其氣通􅀂狂者愼勿令起逡巡自定定而困困即解其􅅞以䓗粥嚾之遂活矣正狂令起非吾之所知也言竟復入府謂崔曰蓮子即生矣崔大釋其怒留坐㕔事俄而蓮子起坐言􅀏界吏報于公公飛牘於崔蓮子復生乃何術也與革偕歸入門則蓮子來迎矣于公大竒之且夫蓮子事崔也非素意因勸以與革崔亦惡其無齒又重于公遂與革得之以神藥􅀓齒未踰月而齒生如故大和壬子歳調授金吾􅀐曹與蓮子偕在輦下其年秋友人髙損之以其元舅爲天官郎日與相聞故熟其事而言之命余繤録耳李衛公靖衛國公李靖微時甞射獵霍山中寓食山村村翁竒其爲人毎豐饋焉歳乆益厚忽遇群鹿乃逐之㑹暮欲捨之不能俄而隂晦迷路茫然不知所歸悵悵而行困悶益極乃極目有燈火光因馳赴焉旣至乃朱門大第墻宇甚峻叩門乆之一人出問公告其迷且請寓宿人曰郎君皆巳出惟大夫人在宿應不可公曰試爲咨白乃入告而出曰夫人􅀄欲不許且以隂黒客又言迷不可不作主人邀入㕔中有頃一青衣出曰夫人來年可五十餘青裙素􅃭神氣清雅宛􅀂士大夫家公前拜之夫人荅拜曰兒子皆不在不合奉留今天色隂晦歸路又迷此􅀂不容遣將何適然此乃山野之居兒子往還或夜到而喧勿以爲懼公曰不敢旣而命食食頗鮮美然多魚食畢夫人入宅二青衣送床席䄄褥衾􅀍香潔皆極鋪陳閉户繫之而去公獨念山野之外夜到而閙者何物也懼不敢寢端坐聽之夜將半聞扣門聲甚急又聞一人應之曰天符大郎子報當行雨周此山七里五更湏足無慢滯無􅤒傷應者受符入呈聞夫人曰兒子二人未歸行兩次到固辭不可違時見責縱使報之亦巳晚矣僮僕無任專之理當如之何一小青衣曰適觀􅆹中客非常人也盍請乎夫人喜因自扣􅆹門曰郎覺否請暫出相見公曰諾遂下堦見之夫人曰此非人宅乃龍宫也妾長男赴東海婚禮小男送妹適奉天符次當行雨計兩處雲程合踰萬里報之不及求代又難輒欲奉煩頃刻間如何公曰靖俗客非乗雲者奈何能行雨有方可教即唯命耳夫人曰苟從吾言無有不可也遂勑黃頭􅀍青騘馬來又命取雨器乃一小缾子繫於鞍前誡曰郎乗馬無􅋘銜勒信其行馬躩地嘶鳴即取瓶中水一滴滴馬鬃上愼勿多也於是上馬騰騰而行其足漸髙但訝其穩疾不自知其雲上也風急如箭雷霆起於歩下於是隨所躩輒滴之旣而電掣雲開下見所憇村思曰吾擾此村多矣方德其人計無以報其乆旱苗稼將悴而雨在我手寧復惜之顧一滴不足濡乃連下二十滴俄頃雨畢􅀐馬復歸夫人者泣於􅆹曰何相悞之甚本約一滴何私感而二十之天此一滴乃地上二尺雨也此夜半平地水深二丈豈復有人妾巳受譴杖八十矣􅃝視其背血痕滿焉兒子並連坐如何公慙怖不知所對夫人復曰郎君丗間人不識雲雨之變誠不敢恨即恐龍師來㝷有􅀁驚恐宜速去此然而勞煩未有以報山居無物有二奴奉贈惣取亦可取一亦可唯意所擇於是命二奴出來一奴從東廊出儀㒵和恱怡怡然一奴從西廊出憤氣勃然拗怒而立公曰成獵徒以􅃲猛爲事一旦取奴而取恱者人以我爲怯乎因曰兩人皆取則不敢夫人旣賜欲取怒者夫人微􅀏曰郎之所欲乃爾遂揖與別奴亦隨去出門數歩迴望失宅顧問其奴亦不見矣獨㝷路而歸及明望其村水巳極目大樹或露梢而巳不復有人其後竟以兵權静㓂難功蓋天下而終不及於相豈非恱奴之不得乎丗言􅀜東出相􅀜西出將豈東西而喻耶所以言奴者亦臣下之象向使二奴皆取即位極將相矣續幽怪録卷第四二册統五十有八番全
