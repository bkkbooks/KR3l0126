  text: 續幽怪録卷第二
  hash: sha256:ebc587e5c794483404f5dea071c25730f50695754ca4b3815df48459016179dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0126_SBCK_002-1a}
body:
  text: 李復言編盧僕射從史盧公元和初以左僕射節制澤潞因鎮陽拒命迹涉不臣為中官驃騎將軍吐突承璀所紿縛送京師以反狀未明左遷歡州司馬既而逆迹盡露賜死於康州寶曆元年蒙州刺史李湘去郡歸闕自以海隅郡守無臺閣之親一旦造上國若扁舟泛滄海者門端溪縣女巫者知未來之事維舟召焉巫到曰某能知未來之事乃見鬼者也呼之皆可召然鬼有二等有福德之鬼有貧賤之鬼福德者精神俊爽往往自與人言貧賤者氣劣神悴假某以言事盡在所遇非某能知也湘曰安得鬼而問之曰廳前楸林下有一人衣紫佩者自稱澤潞盧僕射可拜而請之湘乃公服執簡向林而拜女巫曰僕射巳答拜湘遂揖上階空中曰從史死於此廳為弓弦所遣今尚惡之使君床上弓幸除之湘遽命去焉時驛廳副階上只有一榻湘偶忘其貴將坐問之女巫曰使君無禮僕射官髙何不延坐乃將吏視之僕射大怒去也急隨拜謝或肯却來湘匍匐下階問其所向一步一拜凡數十步空中曰大錯公之官未敵吾軍一禆將奈何對我而自坐湘再三辭謝方肯却回女巫曰僕射却回矣於是拱立而行及階女巫曰僕射上矣別置榻而設禋褥以延之巫曰坐矣湘乃坐空中曰使君何所問對曰湘逺官歸朝憂疑曰極伏知僕射神通造化識逹未然伏乞略賜一言示其榮悴空中曰大有人接引到城一月當刺梧州湘又問終更不言湘因問曰僕射去人寰久矣何不還生人中而久處冥寞曰吁是何言哉人丗勞苦萬愁纒心盡如燈蛾爭撲名利愁勝而髮白神敗而形羸方寸之間波瀾萬丈相妬相賊猛於豪獸故佛以丗界為火宅道以人身為大患吾巳免離下視湯火豈復低身而卧其間乎且夫據其生死明晦未殊學仙成敗則無所異吾巳得煉形之術也其術自無形而煉成三尺之形則上天入地乘雲駕鶴于變萬化無不可也吾之形所未圎者三寸耳飛行自在出幽入明亦可也萬乘之君不及吾況平民乎湘曰煉形之道可得聞乎曰非使君所冝聞也復問梧州之後終而不言乃云湘到輦下以竒貨求助助者數人未一月拜梧州刺史皆如其言竟終於梧州盧所以不復言其後事也李嶽州嶽州刺史李公倰興元中舉進士連不中第次年有故人國子祭酒通春官包結者援成之榜前一日例以名聞執政初五更倰將候祭酒里門未開立馬門側傍有鬻糕者其氣爞爞有一吏若外郡之者小囊氊帽坐於其側欲糕之色盈面倰顧曰此甚賤何不以錢易之客曰囊中無錢耳倰曰倰有錢願獻一飽多少唯意客甚喜啖數片俄而里門開衆竸出客獨附倰馬曰少故願請少間倰下路聽之曰某乃冥吏之送進士名者君非其徒耶倰曰然曰送堂之榜在此可自尋之因出視倰無名垂泣曰苦心筆硯二十餘年偕計而歷試者亦僅十年心破魂斷以望斯舉今復無名豈不終無成乎曰君之成在一年一年之外成名祿位甚盛今欲求之亦非難但於本䘵耗半且多屯剝才獲一郡如何倰曰所求者名名得足矣客曰能行少賂於冥吏即於此取其同姓者去其名而自書其名可乎倰曰幾賂可曰隂錢三萬貫某感恩而以誠告其錢非某敢取將遺牘吏來日午時送可也復授倰自注從上有故太子少師李公夷簡名倰欲揩之客遽曰不可此人祿重未易動也又其下有李溫名客曰可矣倰乃揩去溫字注倰字客遽卷而行曰無違約既而倰詣祭酒祭酒未冠聞倰來怒目延坐徐出曰吾與主司分深一言姓名狀頭可致公何躁甚相疑頻頻見問吾豈輕語者耶倰再拜對曰倰懇於名者若思決此一朝今當呈榜之晨冒責奉謁祭酒曰唯唯其聲甚不平倰見其責憂疑愈極乃變服伺祭酒出之到子城東北隅逢春官懷其榜將赴中書祭酒揖問曰前言遂否春官曰誠知獲罪負荆不足以謝然迫於大權難副髙命祭酒自以交春官深意謂無阻待倰之怒色甚峻今乃不成何面相見因曰季布所以名重天下者能立然諾今君不副然諾移妄於某蓋以某官間也平生交契今日絶矣不揖而行春官遽追之曰迫於豪權留之不得竊持深顧外於形骸見責如此寧得罪於權右耳請同尋榜揩名填之祭酒開榜見李公夷簡欲揩春官急曰此人宰相處分不可去指其下李溫曰可矣遂揩去溫字注倰字及榜出倰名果在巳前所揩處其日午時隨衆參謝不及即糕客之約逮暮將歸道逢糕客泣示之背曰為君所誤得杖矣牘吏將舉勘某更他祈共止之其背實有重杖者倰驚謝之且曰當如何客曰既而勿復道也來日午時送五萬緡亦可無追勘之厄倰曰諾及到時焚之遂不復見然倰筮仕之後追劾貶降不歇於道才得嶽州刺史未幾而終生人之窮逹皆自隂騭豈虛乎哉張質張質者猗氏人元和中明經授亳州臨渙尉到任月餘日𥘉暮見數人執符來追其僕亦持馬俟於階下遂乘馬隨之出縣門𥘉黃昏縣吏由列坐門下略無起者質怒曰州司暫追官不遽廢人吏敢無禮如此人亦不顧出數十里到一柏林使者曰到此冝下馬遂去馬步行約百餘里入城郭直北有大府門門額題曰地府入府經西有門題曰推院吏士甚衆門人曰臨渙尉張質遂入見一美鬚髯衣緋人據案而坐責曰為官本合理人因何曲推事遣人枉死質𬒳捽搶地呌曰質本任解褐到官月餘未嘗推事又曰案牘分明訴人不逺府命追勘仍敢詆欺取枷枷之質又曰訴人既近請與相見曰召冤人來有一老人眇目自西房出疾視質曰此人年少非推某者乃刺祿庫檢到報猗氏張質元和十七年四月二十一日上臨渙尉又檢訴狀𬒳屈抑事又牒隂道亳州其年三月臨渙見任尉年名如巳受替替人年名并受上月日得牒其年三月見任尉江陵張質年五十一元和十一年四月十一日上任十七年四月二十一日受替人檢猗氏張質年四十七檢狀過判官曰名姓偶同遂不審勘錯行文牒追擾平人聞於上司豈斯容易本典決十下改追正身其張尉任歸執符者復引而回若行髙山墜於嵒下遂如夢覺乃在柏林中伏於馬項上雨裛衣背痛不能自起且不知何處隱隱聞樵歌之聲知其有人遂大呼救命樵人來視之驚曰縣失官人并馬此莫是乎竸來問質不能對扶正其身策以送縣其柏林在縣北三十里官吏大喜迎焉質之馬為鬼所加僕人不知及乘馬出門門吏雖環坐為鬼所隱人亦不見有頃家童求質不得問於鄰廳並云不來入廄視馬亦不在而僕夫不覺訪於門吏吏不見出其宰惑之且疑質之𥘉臨也嚴於吏吏怨而殺之是夜坐門者及門人當宿之吏莫不禁錮尋求不得者巳七日矣質歸憩數日方能言然神識遂闕元和六年質尉彭城李生者為之宰訝其神蕩説竒以導之質因具言也韋令公皋公𥘉無官薄遊劒外西川節度使兵部尚書平章事張延賞以女妻之既而惡焉猒薄之情日露公鬱鬱不得志時入幕廷與賔朋從遊且攄其憤張公愈惡乘間謂公曰幕寮無非時彥延賞尚欽憚之韋郎無事不必數到其見輕也如此他日其妻尤甚憫之曰男兒固有四方意大丈夫何處不安今猒賤如此而知者歡然度日竒哉推鼓舞人豈公之樂妾辭家事君子荒隅一間茅屋亦君之居炊菽羮藜簞食瓢飲亦君之食何必忍愧強安為有血氣者可笑時公之道未行自疑其命嘗希乘張之權於仕一旦悟此身茫然於是入告張行意張公遺帛五束夫人薄之揣知深竟不敢言乃私遺二十束公將别而行也自中堂歸院益州女巫適到見之問夫人曰向之緑衣入西院者為誰曰韋郎曰此人極貴位過丞相逺矣其祿將發不久亦鎮此冝殊待之問其所以曰貴人之行必有隂吏相國之侍一二十人耳如緑衣郎者乃百餘人夫人既憫韋之是行也其女且嫁之聞是大喜遽言於相國相國怒曰閨闈中人無端乃如是且延賞女巳嫁此人憐其貧而贈薄請益則加奈何假託妖巫以相誷乎物怒與之帛五束是日韋行月餘日到歧歧帥以西川之貴􅡾延置幕中奏大理評事尋以鞫獄平允加監察以隴州刺史卒出知州事俄而朱泚窺神器駕幸奉天兵戈亂起征鎮路絶輦下軍士衣食將闕獨隴州貢獻不絶於道天子忠之乃除御史中丞行在軍糧使既而妖氛廓清駕還宫闕乃授兵部尚書西川節度使辭相國歲餘代居其位相國聞之拔劒將自抉其目以懲不知人之過左右執之久而方解問知韋路入朝蓋以輕忽之極無面目復見噫夫人未遇其必然乎非張相之忽悔不足以戒天下之傲者鄭虢州騊夫人弘農令女既笄將適盧氏卜吉之日女巫有來者李氏之母問曰小女今夕適人盧郎當來巫當屬見其人官祿厚薄巫曰盧郎非長而髯者乎曰然然則非夫人之子􅡾也夫人子􅡾中形且無髯夫人大驚曰吾女今夕適人何以非盧生曰不知其他盧非子􅡾之貌俄而盧納采夫人怒援巫視之巫曰事在今夕安敢妄乎即盧納其身非夫人之子􅡾也其家大怒共逐焉及夕盧乘軒車來展親迎之禮賔主禮具解珮約花盧若驚奔而出乘馬而遁衆賔追之不及掌人素有氣丈夫不勝其憤且恃其女之容也邀客皆坐呼女出拜其貌之麗天然罕敵指曰此女豈驚人乎今若不出人以為獸形也衆莫不嗟憤掌人曰此女巳奉見衆賔中有能娉者願赴今夕時有鄭騊為盧之儐在坐起曰願事門館於是奉擇相登車成巫之言貌宛然乃知巫之有知也後數年鄭仕於京逢盧問其走狀盧曰兩眼亦且大如盞牙長數寸出於口兩角得無驚奔乎鄭素與盧善乃出其妻以示之盧大慙而退乃知結䄜之親命固前定不可苟求乃驗巫言有徴矣薛偉薛偉者乾元元年在涇州青城縣主簿與丞鄒滂尉雷濟裴寮同時其秋偉病七日忽奄然若往者連呼不應而心頭微暖家人不忍即殮環而伺之經二十日忽長吁起坐謂其人曰吾不知人間幾日矣曰二十日矣與我覷群官方食鱠否言吾巳蘇矣甚有竒事請諸公罷筯來聽也僕人走示群官實欲食鱠遂以告皆停飱而來偉曰諸公勑司户僕張弼求魚乎曰然又問弼曰漁人趙幹藏巨鯉以小者應命汝於葦間得藏者携之而來方入縣也司户吏其坐門東糾曹吏坐門西方奕碁入及階鄒雷方博裴啖桃實弼言幹之藏巨魚也曰五鞭之既付食工王士良者喜而煞之皆然乎遞相問誠然衆曰子何以之曰向煞之鯉我也衆駭曰願聞其説曰吾初疾困為熱所逼殆不可堪忽悶忘其疾惡熱求涼策杖而去不知其夢也既出郭其心欣欣然若籠禽檻獸之得逸莫我如也漸入山山行益悶遂下遊於江畔見江潭深淨秋色可愛輕漣不動鏡涵逺靈忽有思浴意遂脫衣於岸跳身便入自幼狎水成人巳來絶不復戲遇此縱適實契宿心且曰人浮不如魚快也安得攝魚而健遊乎傍有一魚曰顧足下不願耳正授亦易何况求攝當為足下圖之快然而去未頃有魚頭人長數尺騎鯢來導從數十魚宣河伯詔曰城居水遊浮沉異道苟非其好則昧通波薛掌意尚浮深迹思性廣樂浩汗之域放懷清江厭巘崿之情投簮幻丗暫從鱗化非遽成身可權充東潭赤鯉嗚呼恃長波而傾舟得罪於晦昧纎鈎而貪餌見傷於明無惑失身以羞其黨爾其勉之聽而自顧即巳魚服矣於是放身而遊意往斯到波上潭底莫不從容三江五湖騰躍將遍然配留東潭每暮必復俄而飢甚求食不得循舟而行忽見趙幹垂鈎其餌芳香心亦知戒不覺近口曰我人也暫時為魚不能求食乃吞其鈎乎捨之而去有頃飢益甚思曰我是官人戲而魚服縱吞其鈎趙幹豈煞我固當送我歸縣耳遂吞之趙幹收綸以出幹手之將及也偉連呼之幹不聽之而以繩貫我腮乃繫于葦間既而張弼來曰裴少府買魚須大者幹曰未得大魚有小者十餘斤弼曰奉命取大魚安用小者乃自於葦間尋得偉而提之又謂弼曰我是汝縣主簿化形為魚遊江何得不拜我弼不聽提之而行罵亦不巳幹終不顧入縣門見縣吏坐者奕碁皆大聲呼之略無應者唯笑曰可畏魚直三四斤餘而既入階鄒雷方博裴啖桃實皆喜魚大促命付厨弼言幹之藏巨魚以小者應命裴怒鞭之我呌諸公曰我是公同官今而見擒竟不相捨促煞之仁乎哉大呌而泣三君不顧而付鱠手王士良者方持刃喜而投我於機上我又呌曰王士良汝是我之常使鱠手也因何煞我何不執我白於官人士良若不聞者按吾頸於砧上而斬之彼頭適落此亦醒悟遂奉召爾諸公莫不大驚心生愛忍然趙幹之獲張弼之提縣司之奕吏三君之臨階王士良之將煞皆見其口動實無聞焉於是三君並捉鱠終身不食偉自此乎愈後異華陽丞乃卒續幽怪録卷第二
