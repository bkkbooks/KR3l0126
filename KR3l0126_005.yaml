body:
  text: 嘉慶丙寅孟夏月杭州書友介其族人陶藴輝售宋刻李注文選扵余以此續幽怪録二册為副藴輝曰此書向扵東城書坊獲之後歸知不足齋今仍返故土古書殆亦有靈耶余檢卷中藏書家圖記有鄭印敷教一章則其為東城故物無疑桐菴先生秋水軒其去余縣橋新居不逺同里旭亭韓文曽言之兹書歸吴而余適遷居東城因遂淂此以慰書之願云尔蕘翁此臨安府太廟前尹家書籍鋪刋行本也余所淂茅亭客話亦為尹家刋夲行字多寡与此正同然茅亭曽經遵王记之而此書絶未有著于録者可云竒祕矣此録續牛僧孺書夲名玄怪見於陳晁两家之書其云幽怪者殆避宋諱欤陳云五卷晁云十卷今多扵陳而少扵晁其分卷當出更定晁又云分仙術感應三门此不分者殆合并而去其门類也尹氏所見谅已不全就其所載事核之二十三則耳述古堂目所収抄夲正三卷較此更少矣近彚刻書目云稽古堂日鈔亦列其名未知其卷若何然以宋刻爲據則此四卷者固足以覘前此之梗㮣而订後未之疎畧矣余喜讀未見書若此小依然舊刻不可備百宋一㕓書録之續尔古翁记
