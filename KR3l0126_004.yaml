  text: 續幽怪録卷第四
  hash: sha256:31eb0f36c8592d6dc705d8ff266d77b93e549ce5cdfbf1362e6296e426207c74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0126_SBCK_004-1a}
body:
  text: 李復之編張逢南陽張逢元和末薄遊嶺表行次福州福唐縣撗山店時𥘉霽日將暮山色鮮媚煙嵐藹然策杖尋勝不覺極逺忽有一假細草縱廣百餘步碧鮮可愛其傍有一小林遂脫衣掛林以杖倚之投身草上左右翻轉既而酣甚若獸蹍然意足而起其身巳成虎也文彩爛然自視其瓜牙之利胸膊之力天下無敵遂騰躍而起超山越壑其疾如電夜久頗飢因傍村落徐行犬彘駒犢之輩悉無可取意中恍惚自謂當得福州鄭録事乃傍道潜伏未幾有人自南行若候吏迎鄭糾者見人問曰福州鄭録事名璠計程宿前店見說何時發來人曰吾之出掌人也聞其飾裝到亦非久候吏曰只一人來且復有同行者吾當迎拜時慮其誤也曰三人之中慘緑者是其時逢方伺之而彼詳問若為逄而問者逄既知之攢身以俟之俄而鄭糾到導從甚衆衣慘緑甚肥巍巍而來適到逢前遂􅝌銜之走而上山時天未曉人莫敢逐得恣食之殘其腸髮耳行於山林單然無侣乃忽思曰本人也何樂為虎自囚於深山盍求𥘉化之地而復耶乃步步尋之日暮方到其所衣服猶掛杖亦倚林碧草依然翻復轉身於其上意足而起即復人形矣於是衣衣策杖而歸昨往今來一復時矣𥘉其僕夫驚其失逢也訪之於鄰或云策杖登山多歧尋之杳無行處及其來也驚喜問其故逢紿之曰偶尋山泉到一山院共談釋教不覺移時掌人曰今且側近有虎食福州鄭録事求餘不得山林故多猛獸不易獨行郎之未回憂負亦極且喜平安無他逢遂行元和六年旅次淮陽舍於公館館吏宴客坐客有為令者曰巡若到各言巳之竒事事不竒者罰巡到逢逢言橫山之事末坐有進士鄭遐者乃鄭糾之子也怒目而起持刀將煞逢言復父讎衆共隔之遐怒不巳遂白郡將於是送遐淮南勑津吏勿復渡逢西邁具改姓名以避遐議曰聞父之讎不可以不報然此讎非故煞必使煞逢遐亦當坐遂遁去而不復其讎也定婚店杜陵韋固少孤思早娶婦多歧求婚必無成而罷元和二年將遊清河旅次宋城南店客有以前清河司馬潘昉女見議者來日先明期於店西龍興寺門固以求之意切且往焉斜月尚明有老人倚布囊坐於階上向月撿書固步覘之不識其字既非蟲篆八分科斗之勢又非𣑽書因問曰老父所尋者何書固少小苦學丗間之字自謂無不識者西國𣑽字亦能讀之唯此書目所未覿如何老人笑曰此非丗間書君因何得見固曰非丗間書則何也曰幽冥之書固曰幽冥之人何以到此曰君行自早非某不當來也凡幽吏皆掌人生之事掌人可不行冥中乎今道途之行人鬼各半自不辨爾固曰然則君又何掌曰天下之婚牘耳固喜曰固少孤常願早娶以廣㣧嗣爾來十年多方求之竟不遂意今者人有期此與議潘司馬女可以成乎曰未也命苟未合雖降衣纓而求屠博尚不可得况郡佐乎君之婦適三歲矣年十七當入君門因問囊中何物曰赤繩子耳以繫夫妻之足及其生則潜用相繫雖讎敵之家貴賤懸隔天涯從䆠吳楚異鄉此繩一繫終不可逭君之腳巳繫於彼矣他求何益曰固妻安在其家何為曰此店北賣菜陳婆女耳固曰可見乎曰陳嘗抱來鬻菜於市能隨我行當即示君及明所期不至老人卷書揭囊而行固逐之入菜市有眇嫗抱三歲女來弊陋亦甚老人指曰此君之妻也固怒曰煞之可乎老人曰此人命當食天祿因子而食邑庸可煞乎老人遂隱固罵曰老鬼妖妄如此吾士大夫之家娶婦必敵苟不能娶即聲妓之美者或援立之奈何㛰眇嫗之陋女磨一小刀子付其奴曰汝素幹事能為我煞彼女賜汝萬錢奴曰諾明日䄂刀入菜行中於衆中刺之而走一市紛擾固與奴奔走獲免問奴曰所刺中否曰𥘉刺其心不幸才中眉間爾後固屢求婚終無所遂又十四年以父䕃參相州軍刺史王泰俾攝司户掾專鞠詞獄以為能因妻以其女可年十六七容色華麗固稱愜之極然其眉間常帖一花子雖沐浴間處未嘗暫去歲餘固訝之忽憶昔日奴刀中眉間之說因逼問之妻澘然曰妾郡守之猶子也非其女也疇昔曾宰宋城終其官時妾在襁褓母兄次沒唯一㽵在宋城南與乳母陳氏居去店近鬻𬞞以給朝夕陳氏憐小不忍暫弃三歲時抱行市中為狂賊所刺刀痕尚在故以花子覆之七八年前叔從事盧龍遂得在左右仁念以為女嫁君耳固曰陳氏眇乎曰然何以知之固曰所刺者固也乃曰竒也命也因盡言之相欽愈極後生男鯤為鴈門太守封太原郡太夫人乃知隂騭之定不可變也宋城宰聞之題其店曰定婚店葉令女汝州葉縣令盧造者有女勾大曆中許邑客鄭楚曰及長以嫁君之子元方楚拜之俄而楚録潭州軍事造亦辭滿寓葉後楚卒元方護喪居江陵數年間音問兩絶縣令韋計為子娶焉其吉晨元方適到㑹武昌戍邊兵亦止其縣縣隘天雨甚元方無所容徑往縣東十二里佛舍舍西北隅有若小獸號鳴者出火視之乃三虎子目猶未開以其小未能害人且不忍投於雨中閉門堅拒而巳約三更𥘉虎來觸其門不得入其西有窗亦甚堅虎怒搏之櫺祈陷頭於中為左右所轄進退不得元方取佛塔磚擊之虎吼怒拏攫終莫能去連擊之俄頃而斃既而聞門外若女人呻吟氣甚困劣徐問曰門外呻吟者人耶鬼耶曰人也曰何以到此曰妾前盧令女也今夕將適韋氏親迎方登卑為虎所執負荷而來投此今即無損雨甚畏其復來能相救乎元方竒之執燭出視真衣纓也年十七八禮服儼然泥水皆敵既扶入復固其門拾佛塔毀像以繼其明女曰此何處也曰縣東僧舍耳元方言姓名且話舊諾女亦前記之曰妾父曾許妻君一且以君之絶耗也將嫁韋氏天命難改虎送歸君㽵去此甚近君能送歸請絶韋氏而奉巾櫛及明而送歸其家以虎欔而去方坐且制服禮見其來喜若天降元方致虎於縣具言其事縣宰異之以盧氏歸于鄭焉驢言父當騎我我固不辭吾不負汝汝不當騎我汝強騎我我亦騎汝汝我交騎何劫能止以吾之肌膚不啻直萬錢也只負汝一緡半出門貨之人酬亦爾然而無的取者以他人不負吾錢也麩行王胡子負吾二緡吾不負其力取其緡半還汝半緡充口食以終驢限耳和牽歸以告其母母泣曰郎騎汝年深固甚勞苦緡半錢何足惜將捨債豐秣而長生乎驢擺頭又曰賣而取錢乎乃點頭遽令貨之人酬不過緡半且無敢取者牽入西市麩行逢一人長而胡者乃與半易之問其姓曰王自是連雨數日乃晴和往覘之驢巳死矣王竟不得騎又不負之驗也和東鄰有右金吾郎將張逹其妻李之出也余嘗造焉云見驢言之夕遂聞其事且以戒欺暗者故備書之木工蔡榮中牟縣三異鄉木工蔡榮者自幼信神祇每食必分置於地潜祝土地自揔角至於不惑未嘗暫忘也元和二年春卧疾六七日方暮有武吏走來謂其母曰蔡榮衣服器物速藏之勿使人見仍速作婦人裝梳覆以婦人之服有人來問必紿之曰出矣求其處則亦竟對勿令知所在也言訖走去妻母不測其故遽藏器物裝梳才畢有將軍乘馬從十餘人全弓矢直入堂中曰蔡榮在否其母驚惶曰不在曰何往對曰榮醉歸怠於其業老婦怒而笞之榮或潜去不知何月餘日矣將軍遣吏入搜搜者出曰房中無亦無器物將軍連呼地界教藏者出曰諾責曰蔡榮出行豈不知處對曰怒而去不告所由將軍曰王後殿傾須此巧匠期限向盡何人堪替對曰梁城鄉葉幹者巧於蔡榮訏其年限正當追役將軍者走馬而去有頃教藏者亦復曰某地所由也以蔡榮每食必相召故報恩耳然莫不驚之計即乎愈遂去母視榮即汗洽矣自此疾愈俄聞梁城鄉葉幹者暴卒幹妻乃榮母之猶子也審其死者正當榮服雌服之時有李復者從母夫楊林為中牟團乃於三異鄉遍聞其說召榮母問之回以相告泛祭之見德者豈其然乎梁革金吾騎曹梁革得和扁之術者也大和𥘉為宛陵巡官按察使于公敖有青衣美色而艷者曰蓮子念之甚厚一旦以笑語獲罪斥出貨焉市吏定直曰七百緡從事御史崔公者聞而召焉命革侯其脉革侯其臂曰二十春無疾佳人也公喜留之送其直於于公公以常深念也偶怒而逐之售於不識者斯巳矣聞崔公寵之也不恱之意形於顔色然業巳去之難復召矣常貯於懷未一年蓮子暴死革方有外郵之事回及城門逢柩車崔人有執紼者問其所葬曰蓮子也呼載歸而奔告崔曰蓮子非死蓋尸蹶耳向者革入郭遇其柩載歸而請往蘇之崔怒革之𥘉言悲蓮子之遽夭勃然曰匹夫也妄惑諸侯遂齒簪𥚑之列謂二十春無疾者一年而死今既葬矣召柩而歸脫不能生何以相見階前數步之內知公何有革曰此固非死而尸蹶耳千年而一苟不能生之是革術不神於天下何如就死以謝過言乃辭往崔第破棺出之遂刺其心及臍下各數處鑿去一齒以藥一刀圭於口中衣以單衣卧空床上以練索縛其手足有微火於床下曰此火衰蓮子生矣且戒其徒煮䓗粥伺焉其氣通若狂者愼勿令起逡巡自定定而困困即解其縛以䓗粥嚾之遂活矣正狂令起非吾之所知也言竟復入府謂崔曰蓮子即生矣崔大釋其怒留坐㕔事俄而蓮子起坐言笑界吏報于公公飛牘於崔蓮子復生乃何術也與革偕歸入門則蓮子來迎矣于公大竒之且夫蓮子事崔也非素意因勸以與革崔亦惡其無齒又重于公遂與革得之以神藥傳齒未踰月而齒生如故大和壬子歲調授金吾騎曹與蓮子偕在輦下其年秋友人髙損之以其元舅為天官郎日與相聞故熟其事而言之命余繤録耳李衛公靖衛國公李靖微時嘗射獵霍山中寓食山村村翁竒其為人每豐饋焉歲久益厚忽遇群鹿乃逐之㑹暮欲捨之不能俄而隂晦迷路茫然不知所歸悵悵而行困悶益極乃極目有燈火光因馳赴焉既至乃朱門大第墻宇甚峻叩門久之一人出問公告其迷且請寓宿人曰郎君皆巳出惟大夫人在宿應不可公曰試為咨白乃入告而出曰夫人𥘉欲不許且以隂黑客又言迷不可不作主人邀入㕔中有頃一青衣出曰夫人來年可五十餘青裙素𥜗神氣清雅宛若士大夫家公前拜之夫人答拜曰兒子皆不在不合奉留今天色隂晦歸路又迷此若不容遣將何適然此乃山野之居兒子往還或夜到而喧勿以為懼公曰不敢既而命食食頗鮮美然多魚食畢夫人入宅二青衣送床席䄄褥衾𬒳香潔皆極鋪陳閉户繫之而去公獨念山野之外夜到而閙者何物也懼不敢寢端坐聽之夜將半聞扣門聲甚急又聞一人應之曰天符大郎子報當行雨周此山七里五更須足無慢滯無􅤒傷應者受符入呈聞夫人曰兒子二人未歸行兩次到固辭不可違時見責縱使報之亦巳晚矣僮僕無任專之理當如之何一小青衣曰適觀廳中客非常人也盍請乎夫人喜因自扣廳門曰郎覺否請暫出相見公曰諾遂下階見之夫人曰此非人宅乃龍宫也妾長男赴東海婚禮小男送妹適奉天符次當行雨計兩處雲程合踰萬里報之不及求代又難輒欲奉煩頃刻間如何公曰靖俗客非乘雲者奈何能行雨有方可教即唯命耳夫人曰苟從吾言無有不可也遂勑黃頭𬒳青驄馬來又命取雨器乃一小瓶子繫於鞍前誡曰郎乘馬無陋銜勒信其行馬躩地嘶鳴即取瓶中水一滴滴馬鬃上愼勿多也於是上馬騰騰而行其足漸髙但訝其穩疾不自知其雲上也風急如箭雷霆起於步下於是隨所躩輒滴之既而電掣雲開下見所憩村思曰吾擾此村多矣方德其人計無以報其久旱苗稼將悴而雨在我手寧復惜之顧一滴不足濡乃連下二十滴俄頃雨畢騎馬復歸夫人者泣於廳曰何相誤之甚本約一滴何私感而二十之天此一滴乃地上二尺雨也此夜半平地水深二丈豈復有人妾巳受譴杖八十矣袒視其背血痕滿焉兒子並連坐如何公慙怖不知所對夫人復曰郎君丗間人不識雲雨之變誠不敢恨即恐龍師來尋有所驚恐宜速去此然而勞煩未有以報山居無物有二奴奉贈惣取亦可取一亦可唯意所擇於是命二奴出來一奴從東廊出儀㒵和恱怡怡然一奴從西廊出憤氣勃然拗怒而立公曰成獵徒以鬪猛為事一旦取奴而取恱者人以我為怯乎因曰兩人皆取則不敢夫人既賜欲取怒者夫人微笑曰郎之所欲乃爾遂揖與別奴亦隨去出門數步回望失宅顧問其奴亦不見矣獨尋路而歸及明望其村水巳極目大樹或露梢而巳不復有人其後竟以兵權靜寇難功蓋天下而終不及於相豈非恱奴之不得乎丗言關東出相關西出將豈東西而喻耶所以言奴者亦臣下之象向使二奴皆取即位極將相矣續幽怪録卷第四二册統五十有八番全
