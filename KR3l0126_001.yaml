body:
  text: 李復言編楊恭政楊恭政虢州閿鄉縣長壽鄉天仙村田家女也年十八適同村王清其夫貧力田楊氏奉箕帚供農婦之職甚謹夫族目之曰勤力新婦性沉靜不好戲笑有暇必灑掃靜室閉門間居雖鄰婦狎之終不相往來生三男一女年二十四歲元和十二年五月十二日夜告其夫曰妾神識頗不安惡聞人語當於靜室寧之請君與兒女暫居異室其夫以田作困又保無他因以許之不問其故楊氏遂沐浴著新衣掃灑其窒焚香閉户而坐及明訝其起遲開門視之衣服委於床上若蟬蛻然身已去矣但覺異香滿屋其夫驚以告其父母共歎之次鄰人來曰昨夜夜半有天樂從西而來似若雲中下於君家奏樂久之稍稍上去闔村皆聽之君家聞否而異香酷烈遍數十里村吏以告縣令李邯遣吏民逺近尋逐皆無蹤迹因令不動其衣閉其户以棘環之兾其或來也至十八日夜五更村人復聞雲中仙樂之聲異香之芳從東來復王氏宅作樂久之而去王氏亦無聞者及明來視其門棘封如故房中髣佛若有人聲遽走告縣令李邯親率僧道官吏共開其門則新婦者宛在床矣但覺面目光芒有非常之色邯問曰向何所去今何所來對曰昨十五日夜𥘉有仙騎來曰夫人當上仙雲鶴即到冝靜室以俟之遂求靜室至三更有仙樂彩仗霓旌絳節鸞鶴紛紜五雲來降入于房中執節者前曰夫人准籍合仙仙師使者來迎將㑹于西嶽於是綵童二人捧玉箱來獻箱中有竒服非綺非羅製若道人之衣珍華香潔不可名狀遂衣之畢樂作三闋青衣引白鶴來曰冝乘此𥘉尚懼其危試乘之穩不可言飛起而五雲捧出綵仗霓旌次第前引至豫華山雲臺峯峯上有盤石巳有四女先在彼焉一人云姓馬宋州人一人姓徐幽州人一人姓郭荆州人一人姓夏青州人皆其夜成仙同㑹于此傍一小仙曰並捨虛幻得證真仙今當定名冝有真字於是馬曰信真徐曰湛真郭曰修真夏曰守真其時五雲參差遍覆崖谷妙樂羅列間作於前五人相慶曰同生濁界並是凡身一旦翛然遂與塵隔今夕何夕歡㑹於斯冝各賦詩以導其意信真詩曰幾劫澄煩思今身僅小成誓將雲外隱不向丗間行湛真詩曰綽約離塵界從容上太清雲衣無綻日鶴駕沒遙程修真詩曰華嶽無三尺東瀛僅一杯入雲騎綵鳯歌舞上蓬萊守真詩曰共作雲山侶俱辭丗界塵靜思前日事拋却幾年身恭政亦繼詩曰人丗徒紛擾其生似蕣華誰言今夕裏俯首視雲霞既而雕盤珍果名不可知妙樂鏗鍠響動崖谷俄而執節者請曰冝往蓬萊謁大仙伯五真曰大仙伯為誰曰茅君也妓樂鸞鶴復次弟前引東去倐忽間巳到蓬萊其宫闕皆金銀花木樓殿皆非人丗之製作大仙伯居金闕玉堂中侍衛甚嚴見五真喜曰來何晚耶飲以玉杯賜以金簡鳯文之衣玉華之冠配居蓬萊華院四人者出恭政獨前曰王父清年髙無人侍養請回侍其殘年王父去丗然後從命誠不忍得樂而忘王父也唯仙伯哀之仙伯曰恭政汝村一千年方出一仙人汝當之㑹無自墜其道因勑四真送至其家故得還也邯問昔何修習曰村婦何以知但性本虛靜間即凝神而坐不復俗慮得入􅎍中耳此性也非學也又問要去可否曰本無道術何以能去雲鶴來迎即去不來亦無術可召於是遂謝絶其夫服黃冠邯以狀聞州州聞廉使時崔尚書從按察陜輔延之舍於陜州紫極宫請王父於别室人不得升其階唯廉使從事及夫人之瞻拜者才及階而巳亦不得升廉使以聞上召見舍於內殿䖍誠訪道而無以對罷之今見在陜州終歲不食時啖果實或飲酒三兩杯絶無所食但容色轉芳嫩耳辛公平上仙洪州髙安縣尉辛公平吉州廬陵縣尉成士廉同居泗州下邳縣於元和末偕赴調集乘雨入洛西榆林店掌店人甚貧待賔之具莫不塵穢獨一床似潔而有一步客先憩於上矣主人率皆重車馬而輕徒步辛成之來也乃遂步客於他床客倦越於床而回顧公平謂主人曰客之賢不肖不在車徒安知步客非長者以吾有一僕一馬而煩動乎因謂步客曰請公不起僕就矣客曰不敢遂復就寢深夜二人飲酒食肉私曰我欽之之言彼固德我今或召之未惡也公平髙聲曰有少酒肉能相從否一召而來乃緑衣吏也問其姓名曰王臻言辭亮逹辨不可及二人益狎之酒䦨公平曰人皆自天生萬物唯我最靈儒書亦謂人為生靈來日所食便不能知此安得為靈乎臻曰步走能知之夫人生一言一憩之㑹無非前定來日必餐於礠澗王氏致飯𬞞而多品宿於新安趙氏得肝美耳臻以徒步不可晝隨而夜可㑹耳君或不弃敢附末光未明步客前去二人及礠澗逆旅問其姓曰王中堂方饌僧得僧之餘悉奉客故𬞞而多品到新安店叟召之者十數意皆不往試入一家問其姓曰趙將食果有肝美二人相顧方笑而臻適入執其手曰聖人矣禮欽甚篤宵㑹晨分期將來之事莫不中的行次閿鄉臻曰二君固明智之者識臻何為者曰博文多藝隱遁之客也曰非也固不識我乃隂吏之迎駕者曰天子上仙可單使迎乎曰是何言歟甲馬五百將軍一人臻乃軍之籍吏耳曰其徒安在曰左右前後今臻何所以奉白者來日金天置宴謀少酒肉奉遺請華隂相待黃昏臻乘馬引僕携羊豕各半酒數㪷來曰此人間之物幸無疑也言訖而去其酒肉肥濃之極過於華隂聚散如𥘉宿灞上臻曰此行乃人丗不測者也幸君能一觀成公曰何獨弃我曰神祇尚侮人之衰也君命稍薄故不可耳非敢不均其分也入城當舍於開化坊西門北壁上第二板門王家可直造焉辛君初五更立灞西古槐下及期辛步往灞西見旋風卷塵邐迤而去到古槐立未定忽有風來撲林轉所間一旗甲馬立於其前王臻者乘且牽呼臻速登既乘觀焉前後戈甲塞路臻引辛謁大將軍將軍者丈餘㒵甚偉揖公平曰聞君有廣欽之心誠推此心於天下鬼神者且不敢侮况人乎謂臻曰君既召來冝盡主人之分遂同行入通化門及諸街鋪各有吏士迎拜次天門街有紫吏若供頓者曰人多并下不得請逐近配分將軍許之於是分兵五處獨將軍與親衛館於顔魯公廟既入坊顔氏之先簪𥚑而來若迎者遂入舍臻與公平止西廊幕次肴饌馨香味窮海陸其有令公平食之者有令不餐者臻曰陽司授官皆禀隂命臻感二君也撿選事據籍誠當駮放君僅得一官耳臻求名加等吏曹見許矣居數日將軍曰時限向盡在於道埸萬神護蹕無許奉迎如何臻曰牒府請夜宴宴時腥羶衆神自許即可矣遂行牒牒去逡巡得報曰巳勑備夜宴於是部管兵馬戍時齊進入光範及諸門門吏皆立拜宣政殿下馬兵三百餘人步將軍金甲仗鉞來立於所宴殿下五十人從卒環殿露兵若備非常者殿上歌舞方歡俳優贊詠燈燭熒煌絲竹並作俄而三更四點有一人多髯而長碧衫皂袴以紅為褾又以紫縠畫虹蜆為帔結於兩肩右腋之間垂兩端於背冠皮冠非虎非豹飾以紅罽其狀可畏忽不知其所來執金匕首長尺餘拱於將軍之前延聲曰時到矣將軍頻眉揖之唯而走自西廂歷階而上當御座後跪以獻上既而左右紛紜上頭眩音樂驟散扶入西閣久之未出將軍曰升雲之期難違頃刻上既命駕何不遂行對曰上澡身否然可即路遽聞具浴之聲三更上御碧玉輿青衣士六衣上皆畫龍鳯肩舁下殿將軍揖介胃之士無拜因慰問以人間紛拿萬機勞苦淫聲蕩耳妖色感心清真之懷得復存否上曰心非金石見之能無少亂今巳捨離固亦釋然將軍笑之遂步從環殿引翼而出自內閣及諸門吏莫不嗚咽群辭或收血捧輿不忍去者過宣政殿二百騎引三百騎從如風如雷颯然東去出望仙門將軍乃勑臻送公平遂勒馬離隊不覺足巳到一板門前臻曰此開化王家宅成君所止也仙馭巳逺不能從容為臻多謝成君牽轡揚鞭忽不復見公平扣門一聲有人應者果成君也袐不敢泄更數月方有攀髯之泣來年公平授揚州江都縣簿士廉授兖州瑕丘縣丞皆如其言元和𥘉李生疇昔宰彭城而公平之子忝徐州軍事得以詳聞故書其實以警道途之傲者凉國武公李訴凉武公以殊勳之子將元和之兵擒蔡破鄆數年攻戰收城下壁皆以仁恕為先未嘗枉煞一人誠信遇物發於深懇長慶元年秋自魏博節度使左僕射平章事詔徴還京師將入洛其衙門將石季武先在洛夢涼公自此登天津橋季武為導以宰相行呵叱動地有道士八人乘馬持絳節幡幢從南欲上導騎呵之對曰我迎仙公安知宰相招季武與語季武驟馬而前持節道士曰可記我言聞於相公其言曰聳轡排金闕乘軒上漢槎浮名何足戀髙舉入煙霞季武元不識字記姓名又少及隨道士言之再聞巳得道士曰巳記得可先白相公乃驚覺汗流𬒳體喜以為相國由當上仙況俗官乎後三日凉公果自北登天津橋季武為導因入憩天宫寺月餘而薨時人以仁恕端慤之心固合於道安知非謫仙數滿而去乎材行官業著於國史故不書薛中丞存誠御史中丞薛存誠元和末由臺丞入給事中未朞復亞臺長憲閣清嚴塵俗罕到再入之日浩然有間曠之思及廳吟曰卷簾疑客到入户似僧歸後數月閽吏因晝寢未熟髣拂間見僧童數十人持香花幢蓋作𣑽唱次第入臺閽吏呵之曰此御史臺是何法事髙聲入來其一僧自稱識逹曰識逹是中丞弟子來迎本師師在臺可入省迎乎閽吏曰此中丞官亞臺本非僧侣奈何妖敢入臺門即欲擒之識逹曰中丞元是須彌山東峯靜居院羅漢大德緣誤與天下人言意涉近俗謫來俗界五十年年足合歸故來迎耳非汝輩所知也閽吏將馳報遂驚覺後數日薛公自臺中遇疾而薨潜問其年正五十矣麒麟客麒麟客者南陽張茂實家傭僕也茂實家於華山下大中偶遊洛中假僕于南市得一人焉其名曰王敻年可四十餘傭作之直月五百勤幹無私出於深誠苟有可為不待指使茂實器之易其名曰大曆將倍其直固辭其家益憐之居五年計酬直盡一旦辭茂實曰敻本居山家業不薄適與厄㑹須傭作以穰之固非無資也而賣力者仐厄盡矣請從辭茂實不測其言不敢留聽之曰今暮當去逮暮入白茂實曰感君恩宥深以奉報敻家去此甚近其中景趣亦甚可觀能相逐一遊乎茂實喜曰何幸然不欲令家中知潜一遊可乎敻曰甚易於是截竹杖長數尺其上書符受茂實曰君杖此入室稱腹痛左右人悉令取藥去後潜置竹於衾中抽身出來可也茂實從之敻喜曰君真可遊吾居者也相與南行一里餘有黃頭執青麒麟一赤文虎二俟於道左實驚欲回敻曰無苦但前行既到前敻乘麟茂實與黃頭各乘一虎茂實懼不敢近敻曰相隨請不復畏且此物人間之極俊者但試乘之遂慿而上穩不可言於是從之上升掌峯越壑凌山舉意而過殊不覺峻險如到三更計數百里矣下一山物象鮮媚松石可愛樓臺宫觀非丗間所有將及門引者揖鞭曰阿郎來紫衣吏數百人羅拜道側既入青衣數十人容色皆殊衣服鮮華不可名狀各執樂器引拜遂入中堂宴食畢且命茂實坐敻入更衣返坐衣裳冠冕儀貌堂堂然實真仙之風度也其窗户階闥屏幃床榻茵褥之盛固非人丗之所有歌鸞舞鳯及諸聲樂皆所未聞情意髙逸不復思人寰之事歡極主人曰此乃仙居非丗人之所到以君宿緣合一到此故有逃厄之遇仙俗路殊塵靜難雜君冝歸修其心三五劫當復相見敻比者塵緣將盡上界有名得遇太清真人召入小有洞中示以九天之樂復令下指生死海波且曰樂雖難求苦亦易遣如為山者掬土增髙不掬則止穿則陷夫升髙者不上難而下易乎自是修習經六七劫乃證此身回視委骸積如山嶽四大海水半是吾宿丗父母妻子別泣之淚然念念倐之條巳一丗形骸雖逺此不忘修致其功即亦非逺亦時有心逺氣清一言而悟者勉之遺金百鎰為修身之助復乘麒麟令黃頭執之敻步送到家家人方環泣茂實投金於井中敻取去竹杖令茂實潜卧衾中敻曰我當蓬萊謁大仙伯明旦於蓮花峯上有彩雲東去我之乘也遂揖而去茂實忽呻吟衆驚而問之茂實紿之曰𥘉腹痛忽若有人見召遂掩然耳不知其多時日也家人曰取藥既回呼之不應巳七日矣唯心頭尚暖故未殮也明日望之蓮花峯上果有綵雲去遂弃官遊名山後歸出井中金與眷屬再出遊山終不知所在也續幽怪録卷第一
