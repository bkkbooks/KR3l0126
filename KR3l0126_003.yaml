  text: 續幽怪録卷第三
  hash: sha256:7d630f1b081df1f92d5ac98a96f91404d77de9bb8a1bf4054bba101476caf0dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0126_SBCK_003-1a}
body:
  text: 李復言編蘇州客洛陽劉貫詞大曆中求丐于蘇州逢蔡霞秀才者精彩㑺爽之極一相見意頗勤勤以兄見呼貫詞旣而携羊酒來宴酒闌曰兄所泛浮江湖間何爲乎曰求丐耳霞曰有所抵耶泛行郡國耶曰蓬行耳霞曰然則幾獲而止曰十萬霞曰蓬行而望十萬乃無翼而思飛者也設令必得亦廢數月霞居洛中左右下不貧以他故避地音問乆絶意有所託祈兄爲迴途中之費蓬遊之望不擲日月而得如何曰固所願耳霞於是遺錢十萬授書一緘白日逆旅中遽蒙同念旣無形迹輒露心誠霞家長鱗虫宅渭橋下合眼叩橋柱當有應者必邀入宅孃奉見時必請與霞小妹相見旣爲兄弟情不合踈書中亦令渠出拜渠雖年㓜性頗聦惠使渠助爲掌人百緡之贈渠當必諾貫詞遂歸到渭橋下一潭泓澄何計自逹乆之以爲龍神不當我欺試合眼叩之忽有一人應因視之則失橋及潭矣有朱門甲第樓閣參差有紫衣僕拱立於前而問其意貫詞曰來自呉郡郎君有書問者執書以入頃而復出曰太夫人奉屈遂入廳中見太夫人者年四十餘衣服皆紫容皃可愛貫詞拜之太夫人荅拜且謝曰兒子逺遊乆絶音耗勞君惠顧數千里逹書渠少失意上官其痕未減一從遁去三歳寂然非君特來愁緒猶積言訖命坐貫詞曰郎君約爲兄弟小娘子即貫詞妹也亦當相見夫人曰兒子書中亦言渠略梳頭即出奉見俄有青衣曰小娘子來年可十五六容色絶代辯惠過人旣拜坐於母下遂命飲饌亦甚精潔方對食太夫人忽眼赤直視貫詞女急曰哥哥憑來宜且禮待况今宵患不可動揺因曰書中以兄處分令以百緡奉贈旣難獨舉湏使輕賫今奉一噐其價相當可乎貫詞曰巳爲兄弟寄一書扎豈冝受其賜太夫人曰郎君貧遊兒子備𫐠今副其諾不可推辭貫詞謝之因命鎮國椀來又進食未幾太夫人復瞪視眼赤口兩角涎下女急掩其口曰哥哥深誠託人不冝如此乃曰孃年髙風疾發動祗對不得兄冝且出女若懼者遣青衣持椀自隨而投貫詞曰此罽賔國椀其國以鎮灾癘唐人得之固無所用得錢十萬即貨之其下勿鬻某縁孃疾湏侍左右不遂從容再拜而入貫詞持椀而行數歩迴顧碧溜危橋宛似𥘉到而身若適下視手中噐乃一黃色銅椀也其價只三五環矣大以爲龍妹之妄也執鬻於市有酬七百八百者亦有酬五百者念龍神貴信不當欺人日日持行於市及歳餘西市店忽有胡客周視之大喜問其價貫詞曰二百緡客曰物冝所直何止二百緡但非中國之寳有之何益百緡可乎貫詞以𥘉約只爾不復廣求遂許之交受客曰此乃罽賔國鎮國椀也在其國大穰人民忠孝比椀失來其國大荒兵戈亂起吾聞龍子所竊巳僅四年其君方以中國半年之賦召贖君何以致之貫詞具告其實客曰罽賔守龍上訴當追尋次此霞所以避地也隂冥吏嚴不得陳首藉君爲郵送之耳殷勤見妹者非固親也慮老龍之嚵或欲相㗖以其妹衞君耳此椀旣去渠亦當來亦銷患之道也五十日後漕浴波騰瀺灂竟日是霞歸之候也曰何以五十日然後歸客曰吾携過嶺方敢來復貫詞記之及期往視誠然矣張庾張庾舉進士元和十二年居長安昇道里南街十一月八日夜僕夫他宿獨庾在月下忽聞異香氛馥驚惶之次俄聞行歩之聲漸近庾屣履聽之數青衣年十八九艶美無敵推開庾門曰歩月逐勝不必樂遊原只此院小臺藤架可以樂矣遂引少女七八人容色皆艶絶代莫比衣服華麗首飾珍光宛若公王節制家庾側身走入堂前垂簾望之諸女徐行直詣藤下湏臾陳設華麗床榻並列雕盤玉樽杯杓皆竒物八人環坐青衣執樂者十人執板立者二人左右倚立者十人絲管方動坐上一曰不告掌人遂欲張樂得無慢易乎旣是衣冠且非異類邀來同歡亦甚不惡因命一青衣傳語曰姊妹歩月偶入貴院酒肉絲竹輒以自隨秀才能暫出作掌人否夜深計巳脫冠紗巾而來可稱踈野庾聞青衣受命畏其來也乃閇門拒之傳詞者叩門而呼庾不應推門門復閇遂走復命一女曰吾軰同歡人不敢望旣入其家門不召亦合來謁閇門塞户羞見吾徒呼旣不應何湏更召於是一人執樽一人糺司酒旣巡行絲竹合奏餚饌芳珍音曲清亮權貴之極不可名言庾自度此坊南街盡是墟墓絶無人住謂是坊中出來則坊門巳閉若非妖狐乃是鬼物今吾尚未惑可以逐之少頃見迷何能自悟於是潜取枝床石徐開門突出望塵而擊正中臺盤衆起紛紜各執而去庾趂及奪得一盞遽以衣繫之及明解視乃一白角盞盞中之竒不是過也院中香氣數日不歇其盞鏁於櫃中親朋來者莫不傳視竟不能辯其所自後十餘日轉觀之次忽墮地遂不復見庾明年春進士上第焉竇玉妻進士王勝蓋夷元和中求薦於同州其時客多賔舘頗溢二人聞郡功曹王翥私第空閑借其西廊以俟郡試旣而他室皆有人唯正堂以小繩繫門自牗而窺其廂獨床上有褐衾床北有𬒳籠此外空然更無他有問其隣曰處士竇三郎居也二客以西廂爲窄思與同居甚喜其無姬僕也迨暮竇處士者一驢一僕乗醉而來夷勝前謁且曰勝求解於此所得西廊亦甚窄君子旣無姬僕又是方外之人願略同此堂以俟郡試玉固辭接對之色甚傲夷勝銜之夜深將寢忽聞異香驚起㝷之則見堂中垂簾帷喧然語笑於是夷勝突入其堂中屏帷四合竒香撲人雕盤珎膳不可名狀有一女年可十八九妖麗無比與竇三對食侍婢十餘人亦皆端妙燒爐煑茗方熟坐者起入西廂帷中侍婢悉入曰是何兒郎突衝人家竇三者面色如土端坐不語夷勝無以致辭啜茗而出旣下階聞其閉户之聲乃復聽之聞曰風狂兒郎因何共止古人所以卜隣者豈虚言哉致相突乃如此豈非君率易也竇以非巳之居難拒異客必慮輕侮豈無他宅因復懽笑及明往覘之盡復其故竇三者獨偃於裮衾中拭目方起夷勝召詰之不對夷勝曰君晝爲布衣夜㑹公族非習妖幻何以致之麗人不言其實當即告郡竇曰此固祕事言亦無妨比者玉薄遊太原晚發冷泉將宿於孝義縣隂晦失道夜投人㽵問其掌㽵僕曰汾州崔司馬田也令入告焉出曰延入崔司馬年可五十餘衣緋儀㒵可愛問竇之先及伯叔昆弟詰其中外自言其族乃玉親重表丈也自㓜亦甞聞此丈人恨不知其官慰問殷懃情禮優重因令報其妻曰竇秀才乃是右衞將軍七兄之子也是吾之重表姪夫人亦是丈母可見之從䆠異方親戚離阻不因行李豈得相逢請即梳頭相見少頃一青衣曰屈三郎子入其中堂陳設之盛曗若王侯之居盤饌珍華味窮海陸旣食丈人曰君今此遊將何所求曰求舉資耳曰家在何郡曰海内無家萍蓬之士也丈人曰君生涯如此身事落然蓬遊無􅔰徒勞往復丈人有女年近長成今便令奉事衣食之給不求於人可乎玉起拜曰孤客無家才能素薄忽蒙采顧何副眷憐但慮庸虚敢不承命夫人喜曰今夕甚佳又有牢饌親戚中配屬何必廣召賔客吉禮旣便取今夕於是言謝訖復坐又進食食畢揖玉退於西廳具浴浴訖授衣一襲巾櫛一幞引相者三人來皆聦明之士一人姓王稱郡法曹一人姓裴稱戸曹一人姓韋稱郡督郵相揖而坐俄而禮輿香車皆具華燭前引自西廳至中門展親御之禮因又遶㽵一周自南門入及中堂堂中帷帳巳滿成禮訖𥘉三更其妻告玉曰此非人間乃神道也所言汾州隂道汾州非人間也相者數子無非冥官妾與君宿縁合爲夫婦故得相遇人神路殊不可乆住君冝即去玉曰人神旣殊安得配屬巳爲夫婦便合相從信誓之誠言猶在耳一夕而别何太驚人妻曰妾身奉君固無逺邇但君生人不合乆居於此君速命駕入辭而行常令君篋中有絹百疋用盡復滿數萬減焉所到必求静室獨居少以存想隨念即至十年之外可以同行未間晝別宵㑹爾玉入辭丈人曰明晦雖殊人神無二小女子得奉巾櫛蓋是宿縁勿謂異類遂猜薄之亦不可唱言於人公法訊問言亦無妨言訖得絹百疋而別自是每夜獨宿思之則來供帳饌具悉其携也若此者五年矣夷勝開其篋果有絹百疋因各贈三十疋求其祕之言訖遁去不知所在焉房杜二相國房相國元齡杜相國如晦微時甞自周偕之秦宿敷水店適有酒肉夜深對食忽見兩黒毛手出於燈下若有所請乃各以一炙置手中有頃復出若掬又各斟酒與之遂不復見食訖背燈就寢至二更聞街中有髙聲呼王文晸者連呼不巳忽聞一人應於燈下呼者乃曰正東二十里村人有筵神者酒食甚豐汝能去否對曰吾巳醉飽於酒肉有公事去不得勞君相召呼者曰汝終日飢困何有酒肉本非吏人安得公事何妄語也對曰吾𬒳界吏差直二相蒙賜酒肉故不得去若常時聞命即子行吾走耳呼者謝而去二君共喜識之竟同入鳯城詔爲名相焉錢方義殿中侍御史錢方義故華州刺史禮部尚書徽之子寳曆𥘉獨居常樂第夜如厠童僕無從者忽見蓬頭青衣者長數尺來逼方義𥘉懼欲走入以鬼神之來走亦何益乃強謂曰君非郭登耶曰然曰與君殊路何必相見常聞人之見君莫不致死豈方義命當死而見耶將以君故相害耶方義家居華州文兄依佛者亦在在此一旦溘死君手命不敢惜顧人弟之情不足能相容面辭乎蓬頭者復曰登非害人出亦有限人之見者正氣不勝自致夭横非登煞之然有心曲欲以託人以此乆不敢出惟貴人福禄無疆正氣充溢見亦無患故敢出相求耳方義曰何求對曰登乆任此職積効當遷但以福薄湏得人助貴人能爲寫金字金剛經一卷一心表白迴付與登即登之職遂乃小人必有厚報不敢虚言方義曰諾蓬頭者又曰登以隂氣侵陽不人雖福力正強不成疾病亦當有少不安冝急服生犀角生玳瑁麝香塞鼻則無苦矣方義到中堂悶絶欲倒遽服麝香等并塞鼻尚書門人王直温者居同里乆於江嶺從事飛書求得生犀又服之良乆方定明旦召經工令冩金字金剛經三卷貴酬其直令早畢功功畢飯僧讃嘆迴付郭登後月餘歸曰州别墅下馬方憩丈人有姓裴者家寄鄂渚别巳十年忽自門入徑到階下方義遽拜之丈人曰有客且出門遂前示方帝從之及門失丈人矣見一紫𫀆牙笏導從緋紫吏數十人俟於門外俛視其皃乃郭登也歛笏前拜曰弊職當遷只銷金剛經一卷貴人仁念特致三卷今功德極多超轉數等職位崇重爵爲貴豪無非貴人之力雖職巳驟遷其厨仍舊頃者當任實如鮑肆之人今旣别司復未就食方知前苦殆不可堪貴人慈察更爲轉金剛經七遍即改厨矣終身銘德何時敢忘方義曰諾因問丈人安在曰賢丈江夏寢今夕方困神道可求人非其親人湏可自詣適巳先歸耳又曰厠神每月六日十六二十六日例當出巡此日人逢必致灾難人見即死見人即病前者八座抱疾三旬蓋縁登巡畢將歸瞥見半面耳親戚之中湏冝相避方乂又問曰幽冥吏人薄福者衆無所得食率當受餓必能推食泛祭一切鬼神此心不忘咸見斯衆暗中陳力必救灾厄方義曰晦明路殊偶得相遇毎一奉見數日不平意欲所言幸於夢寐轉經之請天暁爲期唯唯而去及明因召所欽僧念金剛經四十九遍又明祝付與郭登功畢夢曰本請一七數又六之累計其功食天厨矣貴人有難當先奉白不爾不敢來黷也泛祭之請記無忘焉復言頃亦聞之未詳其實大和二年秋與方義從兄及河南兄不旬求歧州之薦道途授館日夕同之宵話竒言故及斯事故得以備書焉續幽怪録卷第三
